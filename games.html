<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SAPZCodes — Learning Games</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root {
  --bg: #f5f6f8;
  --surface: #ffffff;
  --surface2: #f0f2f5;
  --border: #e2e6ec;
  --border2: #cdd3db;
  --green: #3ac14a;
  --green-dk: #2da03c;
  --green-lt: #e8f9eb;
  --green-mid: #b8edbf;
  --charcoal: #1a1d23;
  --text: #2c3038;
  --text2: #5a6270;
  --muted: #8a93a2;
  --danger: #e53e3e;
  --danger-lt: #fff0f0;
  --warn: #d97706;
  --warn-lt: #fffbeb;
  --info: #2563eb;
  --info-lt: #eff6ff;
  --success: #16a34a;
  --success-lt: #f0fdf4;
  --sidebar-w: 220px;
  --topbar-h: 52px;
  --radius-sm: 6px;
  --radius: 10px;
  --radius-lg: 14px;
  --radius-xl: 20px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 4px 12px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.05);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.10), 0 4px 10px rgba(0,0,0,0.06);
  --shadow-green: 0 4px 16px rgba(58,193,74,0.25);
  --font: 'Plus Jakarta Sans', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
#root { flex: 1; display: flex; flex-direction: column; }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 8px; }
a { text-decoration: none; color: inherit; }

/* ── TOPBAR ── */
.topbar {
  height: var(--topbar-h);
  background: var(--charcoal);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.2);
}
.topbar-logo { font-size: 16px; font-weight: 800; color: #fff; letter-spacing: -0.3px; }
.topbar-logo span { color: var(--green); }
.topbar-sep { font-size: 10px; color: rgba(255,255,255,0.2); font-family: var(--mono); }
.topbar-page { font-size: 11px; color: rgba(255,255,255,0.4); font-family: var(--mono); letter-spacing: 0.15em; text-transform: uppercase; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.topbar-user { font-size: 11px; color: rgba(255,255,255,0.3); font-family: var(--mono); }
.topbar-btn {
  padding: 5px 14px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.5);
  text-decoration: none;
  transition: all 0.18s;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.topbar-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
.topbar-btn.danger { border-color: rgba(229,62,62,0.3); color: rgba(229,62,62,0.7); }
.topbar-btn.danger:hover { background: var(--danger-lt); color: var(--danger); border-color: var(--danger); }

/* ── MAIN BODY ── */
.main-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}

/* ── HUB PAGE ── */
.hub-hero {
  background: var(--charcoal);
  padding: 48px 32px 56px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hub-hero::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(58,193,74,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(58,193,74,0.04) 1px, transparent 1px);
  background-size: 36px 36px;
  pointer-events: none;
}
.hub-hero::after {
  content: '';
  position: absolute; bottom: -1px; left: 0; right: 0;
  height: 48px;
  background: var(--bg);
  clip-path: ellipse(55% 100% at 50% 100%);
}
.hub-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(58,193,74,0.12);
  border: 1px solid rgba(58,193,74,0.25);
  color: var(--green);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 5px 14px;
  border-radius: 20px;
  margin-bottom: 20px;
  position: relative;
  z-index: 1;
}
.hub-hero h1 {
  font-size: clamp(1.8rem, 4vw, 2.6rem);
  font-weight: 800;
  color: #fff;
  margin-bottom: 12px;
  letter-spacing: -0.4px;
  position: relative;
  z-index: 1;
}
.hub-hero h1 span { color: var(--green); }
.hub-hero p {
  font-size: 14px;
  color: rgba(255,255,255,0.45);
  max-width: 480px;
  margin: 0 auto;
  line-height: 1.7;
  position: relative;
  z-index: 1;
}

/* Stat strip */
.hub-stats {
  display: flex;
  justify-content: center;
  gap: 32px;
  padding: 20px 32px 0;
  flex-wrap: wrap;
}
.hub-stat {
  text-align: center;
}
.hub-stat-val {
  font-size: 22px;
  font-weight: 800;
  color: var(--green-dk);
  font-family: var(--mono);
  line-height: 1;
}
.hub-stat-lbl {
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 3px;
  font-weight: 600;
}

/* Game grid */
.hub-grid {
  max-width: 1000px;
  margin: 40px auto 60px;
  padding: 0 24px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 18px;
}
.game-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 24px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
}
.game-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  border-radius: 3px 3px 0 0;
  background: var(--card-color, var(--green));
  opacity: 0;
  transition: opacity 0.2s;
}
.game-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
  border-color: transparent;
}
.game-card:hover::before { opacity: 1; }
.game-card-icon {
  font-size: 32px;
  margin-bottom: 14px;
  display: block;
}
.game-card-title {
  font-size: 16px;
  font-weight: 800;
  color: var(--charcoal);
  margin-bottom: 6px;
  letter-spacing: -0.2px;
}
.game-card-desc {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.6;
  margin-bottom: 16px;
}
.game-card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.game-card-tag {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: 20px;
  background: var(--green-lt);
  color: var(--green-dk);
  border: 1px solid var(--green-mid);
}
.game-card-play {
  font-size: 12px;
  font-weight: 700;
  color: var(--green-dk);
  display: flex;
  align-items: center;
  gap: 4px;
}

/* ── GAME WRAPPER ── */
.game-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 32px 20px;
  max-width: 860px;
  margin: 0 auto;
  width: 100%;
}

/* Back btn */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 16px;
  border-radius: var(--radius);
  font-size: 12px;
  font-weight: 700;
  font-family: var(--font);
  cursor: pointer;
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--text2);
  transition: all 0.15s;
  box-shadow: var(--shadow-sm);
}
.back-btn:hover { border-color: var(--green); color: var(--green-dk); background: var(--green-lt); }

/* Game header */
.game-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 12px;
}
.game-title {
  font-size: 20px;
  font-weight: 800;
  color: var(--charcoal);
  letter-spacing: -0.3px;
}
.game-subtitle {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}

/* Progress bar */
.progress-bar-wrap {
  height: 4px;
  background: var(--border);
  border-radius: 4px;
  margin-bottom: 24px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green), var(--green-dk));
  border-radius: 4px;
  transition: width 0.4s ease;
  box-shadow: 0 0 8px rgba(58,193,74,0.3);
}

/* Score badge */
.score-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 14px;
  background: var(--success-lt);
  border: 1px solid var(--green-mid);
  border-radius: 20px;
  font-size: 13px;
  font-weight: 800;
  color: var(--success);
  font-family: var(--mono);
}

/* Panel card */
.panel-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow);
  overflow: hidden;
  margin-bottom: 16px;
  animation: fadeUp 0.3s ease both;
}
.panel-card-head {
  padding: 16px 22px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
  display: flex;
  align-items: center;
  gap: 10px;
}
.panel-card-body { padding: 22px; }
.panel-tag {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: 20px;
}
.tag-green { background: var(--green-lt); color: var(--green-dk); border: 1px solid var(--green-mid); }
.tag-red   { background: var(--danger-lt); color: var(--danger); border: 1px solid rgba(229,62,62,0.2); }
.tag-blue  { background: var(--info-lt); color: var(--info); border: 1px solid rgba(37,99,235,0.2); }
.tag-warn  { background: var(--warn-lt); color: var(--warn); border: 1px solid rgba(217,119,6,0.2); }
.tag-gray  { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
.panel-card-title { font-size: 14px; font-weight: 700; color: var(--charcoal); }

/* Option buttons */
.option-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.option-btn {
  padding: 14px 16px;
  background: var(--surface);
  border: 1.5px solid var(--border2);
  border-radius: var(--radius-lg);
  color: var(--text2);
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font);
  cursor: pointer;
  text-align: left;
  line-height: 1.4;
  transition: all 0.2s;
  box-shadow: var(--shadow-sm);
}
.option-btn:hover:not(:disabled) { border-color: var(--green); color: var(--charcoal); box-shadow: var(--shadow-green); }
.option-btn.correct { border-color: var(--green); background: var(--green-lt); color: var(--success); }
.option-btn.wrong   { border-color: var(--danger); background: var(--danger-lt); color: var(--danger); }
.option-btn:disabled { cursor: default; }
.option-letter {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  margin-right: 8px;
}

/* Feedback box */
.feedback-box {
  border-radius: var(--radius-lg);
  padding: 14px 18px;
  font-size: 13px;
  line-height: 1.6;
  margin-top: 12px;
}
.feedback-box.correct { background: var(--success-lt); border: 1px solid var(--green-mid); color: var(--success); }
.feedback-box.wrong   { background: var(--danger-lt); border: 1px solid rgba(229,62,62,0.25); color: var(--danger); }
.feedback-title { font-weight: 700; margin-bottom: 4px; font-size: 13px; }
.feedback-text  { font-size: 12px; color: var(--text2); }

/* Primary action button */
.btn-action {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 10px 24px;
  background: var(--green);
  border: none;
  border-radius: var(--radius-lg);
  color: var(--charcoal);
  font-size: 14px;
  font-weight: 700;
  font-family: var(--font);
  cursor: pointer;
  box-shadow: var(--shadow-green);
  transition: all 0.18s;
  letter-spacing: 0.01em;
}
.btn-action:hover { background: var(--green-dk); transform: translateY(-1px); }
.btn-action:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 10px 20px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius-lg);
  color: var(--text2);
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: all 0.18s;
}
.btn-secondary:hover { border-color: var(--green); color: var(--green-dk); background: var(--green-lt); }
.btn-danger {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  background: var(--danger-lt);
  border: 1px solid rgba(229,62,62,0.25);
  border-radius: var(--radius);
  color: var(--danger);
  font-size: 12px;
  font-weight: 700;
  font-family: var(--font);
  cursor: pointer;
  transition: all 0.15s;
}
.btn-danger:hover { background: var(--danger); color: #fff; }

/* Terminal code block */
.code-block {
  background: var(--charcoal);
  border-radius: var(--radius-lg);
  padding: 16px 20px;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.7;
  color: #e2e8f0;
  overflow-x: auto;
  margin-bottom: 14px;
}
.code-textarea-dark {
  width: 100%;
  min-height: 130px;
  background: var(--charcoal);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-lg);
  padding: 14px 18px;
  color: #e2e8f0;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.7;
  resize: vertical;
  outline: none;
  transition: border-color 0.18s;
}
.code-textarea-dark:focus { border-color: var(--green); }

/* Match game */
.match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.match-col-label { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); text-align: center; margin-bottom: 8px; }
.match-item {
  padding: 11px 14px;
  border-radius: var(--radius);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  text-align: left;
  transition: all 0.18s;
  border: 1.5px solid var(--border2);
  background: var(--surface);
  color: var(--text2);
  width: 100%;
  font-family: var(--mono);
}
.match-item:hover:not(:disabled) { border-color: var(--green); color: var(--charcoal); background: var(--green-lt); }
.match-item.selected { border-color: var(--info); background: var(--info-lt); color: var(--info); }
.match-item.matched { border-color: var(--green); background: var(--green-lt); color: var(--success); opacity: 0.7; cursor: default; }
.match-item.wrong-flash { border-color: var(--danger); background: var(--danger-lt); color: var(--danger); }
.match-meaning { font-family: var(--font); letter-spacing: 0; }

/* RAP sorter */
.sorter-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.sorter-card {
  background: var(--surface);
  border: 1.5px solid var(--border2);
  border-radius: var(--radius-lg);
  padding: 14px;
  transition: border-color 0.2s;
}
.sorter-card.assigned { border-color: var(--info); }
.sorter-card.correct  { border-color: var(--green); }
.sorter-card.wrong-ans{ border-color: var(--danger); }
.sorter-card-text { font-size: 13px; font-weight: 600; color: var(--charcoal); margin-bottom: 10px; line-height: 1.4; }
.sorter-layer-btn {
  display: block;
  width: 100%;
  text-align: left;
  padding: 5px 8px;
  border-radius: var(--radius-sm);
  font-size: 11px;
  font-family: var(--font);
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  margin-bottom: 4px;
  transition: all 0.15s;
}
.sorter-layer-btn:hover { border-color: var(--green); color: var(--green-dk); background: var(--green-lt); }
.sorter-layer-btn.chosen { border-color: var(--info); background: var(--info-lt); color: var(--info); font-weight: 700; }

/* Speed coder */
.speed-target {
  background: var(--charcoal);
  border-radius: var(--radius-lg);
  padding: 20px 22px;
  font-family: var(--mono);
  font-size: 14px;
  line-height: 1.8;
  margin-bottom: 16px;
  letter-spacing: 0.02em;
}
.speed-char-done  { color: var(--green); }
.speed-char-error { color: var(--danger); background: rgba(229,62,62,0.15); border-radius: 2px; }
.speed-char-wait  { color: rgba(255,255,255,0.2); }

/* Result page */
.result-wrap {
  max-width: 500px;
  margin: 0 auto;
  text-align: center;
  padding: 40px 20px;
}
.result-emoji { font-size: 56px; margin-bottom: 16px; }
.result-title { font-size: 26px; font-weight: 800; color: var(--charcoal); margin-bottom: 6px; letter-spacing: -0.4px; }
.result-score { font-size: 48px; font-weight: 800; color: var(--green-dk); font-family: var(--mono); margin: 16px 0 4px; line-height: 1; }
.result-pct { font-size: 14px; color: var(--muted); margin-bottom: 28px; }
.result-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.result-msg { font-size: 14px; color: var(--text2); margin-bottom: 20px; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

if (!sessionStorage.getItem('szc_token')) window.location.href = 'index.html';
const STUDENT_NAME = sessionStorage.getItem('szc_name') || 'Student';

/* ═══════════════════════════════════════════════════
   GAME DATA
═══════════════════════════════════════════════════ */
const QUIZ_QUESTIONS = [
  { q:"Which keyword declares an internal table?", opts:["DATA","TABLE","ITAB","DECLARE"], ans:0, exp:"DATA lt_table TYPE TABLE OF ... declares an internal table in ABAP." },
  { q:"What does sy-subrc = 0 mean?", opts:["Error occurred","Success / Record found","Table is empty","Loop ended"], ans:1, exp:"sy-subrc = 0 means the last operation was successful (e.g., SELECT found records)." },
  { q:"Which statement reads one row from an internal table?", opts:["SELECT SINGLE","READ TABLE","FETCH","GET TABLE"], ans:1, exp:"READ TABLE lt_tab INTO ls_row WITH KEY field = value." },
  { q:"In RAP, what does 'unmanaged' mean?", opts:["Framework manages CRUD","Developer writes own save logic","No behavior needed","Read-only operations"], ans:1, exp:"Unmanaged RAP: developer writes all CRUD logic in save_modified." },
  { q:"Which CDS annotation exposes a view as OData?", opts:["@OData.publish","@Fiori.Launch","@OData.entitySet","@Sap.semantics"], ans:0, exp:"@OData.publish: true on the consumption view exposes it as OData service." },
  { q:"What is HANA-optimized SELECT syntax?", opts:["SELECT * FROM mara","SELECT * FROM I_Material INTO TABLE @lt_mat","SELECT ALL FROM mara","FETCH mara INTO lt_mat"], ans:1, exp:"Use CDS view names with INTO TABLE @lt_mat (ABAP 7.40+ syntax)." },
  { q:"Which method handles CREATE in RAP behavior impl?", opts:["CREATE","create","MODIFY_ENTITY","create_by_association"], ans:1, exp:"The 'create' method in the behavior implementation class handles CREATE." },
  { q:"What does AMDP stand for?", opts:["ABAP Managed Dynamic Procedure","ABAP Managed Database Procedure","Advanced MDX Processor","Automated Data Processor"], ans:1, exp:"AMDP = ABAP Managed Database Procedure — runs native HANA SQLScript inside ABAP." },

/* ═══════════════════════════════════════════════════

═══════════════════════════════════════════════════ */
function ScoreBadge({ score, total }) {
  const pct = total > 0 ? Math.round((score / total) * 100) : 0;
  return (
    <span className="score-badge">
      {score}/{total} · {pct}%
    </span>
  );
}

function ProgressBar({ current, total }) {
  return (
    <div className="progress-bar-wrap">
      <div className="progress-bar-fill" style={{ width: `${(current / total) * 100}%` }}/>
    </div>
  );
}

function GameResult({ score, total, gameName, onBack, onReplay }) {
  const pct = total > 0 ? Math.round((score / total) * 100) : 0;
  const emoji = pct >= 80 ? '🏆' : pct >= 50 ? '👍' : '📚';
  const msg = pct >= 80 ? 'Outstanding! You clearly know your ABAP.' : pct >= 50 ? 'Good effort! Review the tricky ones and try again.' : 'Keep practicing — ABAP mastery takes repetition!';
  return (
    <div className="result-wrap">
      <div className="result-emoji">{emoji}</div>
      <div className="result-title">{gameName} — Complete!</div>
      <div className="result-score">{score}/{total}</div>
      <div className="result-pct">{pct}% correct</div>
      <div className="result-msg">{msg}</div>
      <div className="result-actions">
        <button className="btn-action" onClick={onReplay}>↺ Play Again</button>
        <button className="btn-secondary" onClick={onBack}>← All Games</button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   GAME 1: ABAP QUIZ
═══════════════════════════════════════════════════ */
function QuizGame({ onBack }) {
  const [questions] = useState(() => [...QUIZ_QUESTIONS].sort(() => Math.random() - 0.5).slice(0, 10));
  const [idx, setIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);

  const q = questions[idx];

  const choose = (i) => {
    if (selected !== null) return;
    setSelected(i);
    if (i === q.ans) setScore(s => s + 1);
  };

  const next = () => {
    if (idx + 1 >= questions.length) { setDone(true); return; }
    setIdx(i => i + 1);
    setSelected(null);
  };

  if (done) return <GameResult score={score} total={questions.length} gameName="ABAP Quiz" onBack={onBack} onReplay={() => { setIdx(0); setScore(0); setDone(false); setSelected(null); }}/>;

  return (
    <div className="game-wrap">
      <div className="game-header">
        <div>
          <div className="game-title">🧠 ABAP Quiz</div>
          <div className="game-subtitle">Q {idx + 1} of {questions.length}</div>
        </div>
        <ScoreBadge score={score} total={idx + (selected !== null ? 1 : 0)}/>
        <button className="btn-danger" onClick={onBack}>← Back</button>
      </div>
      <ProgressBar current={idx + 1} total={questions.length}/>

      <div className="panel-card">
        <div className="panel-card-head">
          <span className="panel-tag tag-green">Question</span>
          <span className="panel-card-title" style={{ flex: 1 }}>{q.q}</span>
        </div>
        <div className="panel-card-body">
          <div className="option-grid">
            {q.opts.map((opt, i) => {
              let cls = 'option-btn';
              if (selected !== null) {
                if (i === q.ans) cls += ' correct';
                else if (i === selected && i !== q.ans) cls += ' wrong';
              }
              return (
                <button key={i} className={cls} onClick={() => choose(i)} disabled={selected !== null}>
                  <span className="option-letter">{'ABCD'[i]}.</span>{opt}
                </button>
              );
            })}
          </div>

          {selected !== null && (
            <div className={`feedback-box${selected === q.ans ? ' correct' : ' wrong'}`}>
              <div className="feedback-title">{selected === q.ans ? '✅ Correct!' : `❌ Wrong — Answer: ${q.opts[q.ans]}`}</div>
              <div className="feedback-text">{q.exp}</div>
            </div>
          )}

          {selected !== null && (
            <div style={{ textAlign: 'right', marginTop: 14 }}>
              <button className="btn-action" onClick={next}>
                {idx + 1 >= questions.length ? 'See Results →' : 'Next →'}
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   GAME 2: DEBUG MASTER
═══════════════════════════════════════════════════ */
function DebugGame({ onBack }) {
  const [idx, setIdx] = useState(0);
  const [code, setCode] = useState(DEBUG_CHALLENGES[0].buggy);
  const [result, setResult] = useState(null);
  const [hintShown, setHintShown] = useState(false);
  const [hintUsed, setHintUsed] = useState(false);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);
  const ch = DEBUG_CHALLENGES[idx];

  const check = () => {
    const norm = s => s.replace(/\s+/g, ' ').trim().toLowerCase();
    const correct = norm(code) === norm(ch.fixed);
    setResult(correct ? 'correct' : 'wrong');
    if (correct) setScore(s => s + (hintUsed ? 0.5 : 1));
  };

  const next = () => {
    const ni = idx + 1;
    if (ni >= DEBUG_CHALLENGES.length) { setDone(true); return; }
    setIdx(ni);
    setCode(DEBUG_CHALLENGES[ni].buggy);
    setResult(null);
    setHintShown(false);
    setHintUsed(false);
  };

  const showHint = () => { setHintShown(true); setHintUsed(true); };
  const showSolution = () => { setCode(ch.fixed); setResult(null); };

  if (done) return <GameResult score={Math.round(score)} total={DEBUG_CHALLENGES.length} gameName="Debug Master" onBack={onBack} onReplay={() => { setIdx(0); setCode(DEBUG_CHALLENGES[0].buggy); setResult(null); setScore(0); setDone(false); setHintShown(false); setHintUsed(false); }}/>;

  return (
    <div className="game-wrap">
      <div className="game-header">
        <div>
          <div className="game-title">🐛 Debug Master</div>
          <div className="game-subtitle">Bug {idx + 1} of {DEBUG_CHALLENGES.length} — {score} pts</div>
        </div>
        <button className="btn-danger" onClick={onBack}>← Back</button>
      </div>
      <ProgressBar current={idx + 1} total={DEBUG_CHALLENGES.length}/>

      <div className="panel-card">
        <div className="panel-card-head">
          <span className="panel-tag tag-red">🐛 Bug #{idx + 1}</span>
          <span className="panel-card-title">{ch.title}</span>
          <button className="btn-secondary" style={{ marginLeft: 'auto', fontSize: 12, padding: '5px 12px' }}
            onClick={showHint} disabled={hintShown}>
            {hintShown ? 'Hint used (−0.5)' : '💡 Hint (−0.5)'}
          </button>
        </div>
        <div className="panel-card-body">
          <div style={{ fontSize: 12, color: 'var(--muted)', marginBottom: 10 }}>
            Fix the buggy ABAP code below — edit directly in the editor.
          </div>
          {hintShown && (
            <div className="feedback-box" style={{ background: 'var(--warn-lt)', border: '1px solid rgba(217,119,6,0.25)', color: 'var(--warn)', marginBottom: 12 }}>
              💡 {ch.hint}
            </div>
          )}
          <textarea className="code-textarea-dark" value={code} onChange={e => setCode(e.target.value)}/>

          {result === 'correct' && (
            <div className="feedback-box correct" style={{ marginTop: 12 }}>
              <div className="feedback-title">✅ Fixed! +{hintUsed ? '0.5' : '1'} point</div>
              <div className="feedback-text">{ch.explanation}</div>
            </div>
          )}
          {result === 'wrong' && (
            <div className="feedback-box wrong" style={{ marginTop: 12 }}>
              <div className="feedback-title">❌ Not quite — compare carefully with the original</div>
            </div>
          )}

          <div style={{ display: 'flex', gap: 10, marginTop: 16, flexWrap: 'wrap' }}>
            {!result && <button className="btn-action" onClick={check}>🔍 Check Fix</button>}
            {result === 'correct' && <button className="btn-action" onClick={next}>{idx + 1 >= DEBUG_CHALLENGES.length ? 'Results →' : 'Next Bug →'}</button>}
            {result === 'wrong' && (
              <>
                <button className="btn-action" onClick={() => setResult(null)}>Try Again</button>
                <button className="btn-secondary" onClick={showSolution}>Show Solution</button>
              </>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   GAME 3: ANNOTATION MATCH
═══════════════════════════════════════════════════ */
function AnnotationMatch({ onBack }) {
  const [pairs] = useState(() => [...ANNOTATION_PAIRS].sort(() => Math.random() - 0.5).slice(0, 8));
  const [meanings] = useState(() => {
    const m = [...ANNOTATION_PAIRS].sort(() => Math.random() - 0.5).slice(0, 8).map(p => p.meaning);
    return m.sort(() => Math.random() - 0.5);
  });
  const [selected, setSelected] = useState(null);
  const [matched, setMatched] = useState([]);
  const [wrongFlash, setWrongFlash] = useState(null);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);

  const pickAnnotation = (ann) => {
    if (matched.includes(ann)) return;
    setSelected(ann);
  };

  const pickMeaning = (meaning) => {
    if (!selected) return;
    const correct = pairs.find(p => p.annotation === selected)?.meaning === meaning;
    if (correct) {
      const newMatched = [...matched, selected];
      setMatched(newMatched);
      setScore(s => s + 1);
      setSelected(null);
      if (newMatched.length >= pairs.length) setTimeout(() => setDone(true), 500);
    } else {
      setWrongFlash({ ann: selected, meaning });
      setTimeout(() => { setWrongFlash(null); setSelected(null); }, 800);
    }
  };

  if (done) return <GameResult score={score} total={pairs.length} gameName="Annotation Match" onBack={onBack} onReplay={() => window.location.reload()}/>;

  return (
    <div className="game-wrap">
      <div className="game-header">
        <div>
          <div className="game-title">🎯 Annotation Match</div>
          <div className="game-subtitle">Click annotation → then its meaning</div>
        </div>
        <ScoreBadge score={score} total={pairs.length}/>
        <button className="btn-danger" onClick={onBack}>← Back</button>
      </div>

      <div className="match-grid">
        {/* Annotations */}
        <div>
          <div className="match-col-label">CDS Annotations</div>
          {pairs.map(p => {
            const isMatched = matched.includes(p.annotation);
            const isSelected = selected === p.annotation;
            const isWrong = wrongFlash?.ann === p.annotation;
            let cls = 'match-item';
            if (isMatched) cls += ' matched';
            else if (isWrong) cls += ' wrong-flash';
            else if (isSelected) cls += ' selected';
            return (
              <button key={p.annotation} className={cls} onClick={() => pickAnnotation(p.annotation)} disabled={isMatched}
                style={{ marginBottom: 8 }}>
                {isMatched ? '✓ ' : ''}{p.annotation}
              </button>
            );
          })}
        </div>
        {/* Meanings */}
        <div>
          <div className="match-col-label">Meanings</div>
          {meanings.map(m => {
            const isUsed = matched.some(ann => pairs.find(p => p.annotation === ann)?.meaning === m);
            const isWrong = wrongFlash?.meaning === m;
            let cls = 'match-item match-meaning';
            if (isUsed) cls += ' matched';
            else if (isWrong) cls += ' wrong-flash';
            return (
              <button key={m} className={cls} onClick={() => pickMeaning(m)} disabled={isUsed}
                style={{ marginBottom: 8 }}>
                {isUsed ? '✓ ' : ''}{m}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function RAPSorter({ onBack }) {
  const [items] = useState(() => [...RAP_ITEMS].sort(() => Math.random() - 0.5));
  const [assignments, setAssignments] = useState({});
  const [checked, setChecked] = useState(false);
  const [score, setScore] = useState(0);

  const assign = (id, layer) => {
    if (checked) return;
    setAssignments(a => ({ ...a, [id]: layer }));
  };

  const checkAll = () => {
    let s = 0;
    items.forEach(item => { if (assignments[item.id] === item.layer) s++; });
    setScore(s);
    setChecked(true);
  };

  const allAssigned = items.every(item => assignments[item.id]);

  return (
    <div className="game-wrap">
      <div className="game-header">
        <div>
          <div className="game-title">🗂 RAP Layer Sorter</div>
          <div className="game-subtitle">Assign each artifact to its correct layer</div>
        </div>
        {checked && <ScoreBadge score={score} total={items.length}/>}
        <button className="btn-danger" onClick={onBack}>← Back</button>
      </div>

      <div className="sorter-grid">
        {items.map(item => {
          const chosen = assignments[item.id];
          const correct = checked && chosen === item.layer;
          const wrong = checked && chosen && chosen !== item.layer;
          let cls = 'sorter-card';
          if (chosen && !checked) cls += ' assigned';
          else if (correct) cls += ' correct';
          else if (wrong) cls += ' wrong-ans';
          return (
            <div key={item.id} className={cls}>
              <div className="sorter-card-text">{item.text}</div>
              {checked && (
                <div style={{ fontSize: 11, fontWeight: 700, color: correct ? 'var(--success)' : 'var(--danger)', marginBottom: 8 }}>
                  {correct ? `✓ ${item.layer}` : `✗ → ${item.layer}`}
                </div>
              )}
              {!checked && RAP_LAYERS.map(layer => (
                <button key={layer} className={`sorter-layer-btn${chosen === layer ? ' chosen' : ''}`}
                  onClick={() => assign(item.id, layer)}>
                  {chosen === layer ? '● ' : ''}{layer}
                </button>
              ))}
            </div>
          );
        })}
      </div>

      <div style={{ textAlign: 'center', marginTop: 28 }}>
        {!checked ? (
          <button className="btn-action" onClick={checkAll} disabled={!allAssigned}
            style={{ opacity: allAssigned ? 1 : 0.5 }}>
            ✓ Check All Answers
          </button>
        ) : (
          <div>
            <div style={{ fontSize: 18, fontWeight: 800, color: score >= 6 ? 'var(--success)' : score >= 4 ? 'var(--warn)' : 'var(--danger)', marginBottom: 16, fontFamily: 'var(--mono)' }}>
              {score}/{items.length} Correct!
            </div>
            <div style={{ display: 'flex', gap: 10, justifyContent: 'center' }}>
              <button className="btn-action" onClick={() => window.location.reload()}>↺ Retry</button>
              <button className="btn-secondary" onClick={onBack}>← All Games</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   GAME 6: SPEED CODER
═══════════════════════════════════════════════════ */
function SpeedCoder({ onBack }) {
  const [challenges] = useState(() => [...SPEED_LINES].sort(() => Math.random() - 0.5));
  const [idx, setIdx] = useState(0);
  const [input, setInput] = useState('');
  const [score, setScore] = useState(0);
  const [times, setTimes] = useState([]);
  const [startTime, setStartTime] = useState(Date.now());
  const [flash, setFlash] = useState(null);
  const [done, setDone] = useState(false);
  const inputRef = useRef(null);

  const target = challenges[idx];

  useEffect(() => {
    inputRef.current?.focus();
    setStartTime(Date.now());
  }, [idx]);

  const handleInput = (e) => {
    const val = e.target.value;
    setInput(val);
    if (val === target) {
      const elapsed = Date.now() - startTime;
      setTimes(t => [...t, elapsed]);
      setScore(s => s + 1);
      setFlash('correct');
      setTimeout(() => {
        setFlash(null);
        setInput('');
        if (idx + 1 >= challenges.length) setDone(true);
        else setIdx(i => i + 1);
      }, 600);
    }
  };

  const skip = () => {
    setInput('');
    if (idx + 1 >= challenges.length) setDone(true);
    else setIdx(i => i + 1);
  };

  if (done) {
    const totalMs = times.reduce((a, b) => a + b, 0);
    return (
      <div className="result-wrap">
        <div className="result-emoji">⚡</div>
        <div className="result-title">Speed Coder — Done!</div>
        <div className="result-score">{score}/{challenges.length}</div>
        <div className="result-pct">
          Total time: {(totalMs / 1000).toFixed(1)}s
          {score > 0 && ` · Avg: ${(totalMs / score / 1000).toFixed(1)}s/line`}
        </div>
        <div className="result-actions">
          <button className="btn-action" onClick={() => { setIdx(0); setScore(0); setDone(false); setInput(''); setTimes([]); }}>↺ Play Again</button>
          <button className="btn-secondary" onClick={onBack}>← All Games</button>
        </div>
      </div>
    );
  }

  const matched = target.split('').map((ch, i) => ({
    ch,
    typed: i < input.length,
    ok: input[i] === ch,
  }));

  return (
    <div className="game-wrap">
      <div className="game-header">
        <div>
          <div className="game-title">⚡ Speed Coder</div>
          <div className="game-subtitle">Line {idx + 1} of {challenges.length} · Score: {score}</div>
        </div>
        <button className="btn-danger" onClick={onBack}>← Back</button>
      </div>
      <ProgressBar current={idx + 1} total={challenges.length}/>

      <div className="panel-card" style={{ borderColor: flash === 'correct' ? 'var(--green)' : undefined, transition: 'border-color 0.3s' }}>
        <div className="panel-card-head">
          <span className="panel-tag tag-blue">⚡ Type This Exactly</span>
        </div>
        <div className="panel-card-body">
          <div className="speed-target">
            {matched.map((m, i) => {
              let cls = 'speed-char-wait';
              if (m.typed) cls = m.ok ? 'speed-char-done' : 'speed-char-error';
              return <span key={i} className={cls}>{m.ch}</span>;
            })}
          </div>
          <input
            ref={inputRef}
            value={input}
            onChange={handleInput}
            style={{
              width: '100%',
              padding: '12px 16px',
              fontFamily: 'var(--mono)',
              fontSize: 13,
              background: 'var(--surface2)',
              border: `1.5px solid ${input.length > 0 && input === target.slice(0, input.length) ? 'var(--green)' : 'var(--border2)'}`,
              borderRadius: 'var(--radius)',
              color: 'var(--text)',
              outline: 'none',
              marginBottom: 14,
            }}
            placeholder="Start typing..."
            spellCheck={false}
            autoCorrect="off"
            autoCapitalize="off"
          />
          {flash === 'correct' && (
            <div style={{ fontSize: 13, color: 'var(--success)', fontWeight: 700 }}>✅ Correct! Moving on...</div>
          )}
          <div style={{ textAlign: 'right', marginTop: 8 }}>
            <button className="btn-secondary" onClick={skip} style={{ fontSize: 12, padding: '6px 14px' }}>Skip →</button>
          </div>
        </div>
      </div>
    </div>
  );
}
