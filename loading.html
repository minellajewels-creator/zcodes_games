<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SAPZCodes — Initializing</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --neon-cyan: #00F5FF;
      --neon-green: #39FF14;
      --dark-bg: #020B18;
      --sap-blue: #0057A8;
      --text-main: #E0F4FF;
      --text-dim: #7AA8C4;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--dark-bg);
      color: var(--text-main);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ANIMATED BG */
    body::before {
      content:'';
      position:fixed;
      inset:0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 50%, rgba(0,87,168,0.12) 0%, transparent 70%);
      pointer-events:none;
    }
    body::after {
      content:'';
      position:fixed;
      inset:0;
      background-image:
        linear-gradient(rgba(0,87,168,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,87,168,0.07) 1px, transparent 1px);
      background-size:50px 50px;
      pointer-events:none;
    }

    canvas#particle { position:fixed; inset:0; pointer-events:none; z-index:0; }

    /* CENTER CARD */
    .load-wrap {
      position:relative;
      z-index:10;
      text-align:center;
      padding:20px;
    }

    /* LOGO */
    .logo {
      font-family:'Orbitron',monospace;
      font-size:clamp(1.8rem,5vw,3rem);
      font-weight:900;
      letter-spacing:4px;
      margin-bottom:8px;
      opacity:0;
      animation: fadeIn 0.6s ease 0.3s forwards;
    }
    .logo span { color:var(--neon-cyan); text-shadow:0 0 30px rgba(0,245,255,0.7); }

    .logo-tagline {
      font-size:11px;
      letter-spacing:5px;
      color:var(--text-dim);
      text-transform:uppercase;
      margin-bottom:50px;
      opacity:0;
      animation: fadeIn 0.6s ease 0.5s forwards;
    }

    /* HEX LOADER */
    .hex-loader {
      width:100px;
      height:115px;
      margin:0 auto 40px;
      position:relative;
      opacity:0;
      animation: fadeIn 0.6s ease 0.7s forwards;
    }

    .hex-loader svg {
      width:100%;
      height:100%;
      animation: rotateSlow 8s linear infinite;
    }

    .hex-inner {
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:'Orbitron',monospace;
      font-size:11px;
      font-weight:700;
      color:var(--neon-cyan);
      flex-direction:column;
      gap:2px;
    }
    .hex-pct {
      font-size:22px;
      font-weight:900;
      text-shadow:0 0 15px var(--neon-cyan);
    }

    @keyframes rotateSlow { to { transform:rotate(360deg); } }

    /* PROGRESS BAR */
    .progress-wrap {
      width:320px;
      max-width:90vw;
      margin:0 auto 28px;
      opacity:0;
      animation: fadeIn 0.6s ease 0.9s forwards;
    }
    .progress-track {
      height:3px;
      background:rgba(0,245,255,0.1);
      border-radius:2px;
      overflow:hidden;
      margin-bottom:10px;
    }
    .progress-fill {
      height:100%;
      width:0%;
      background:linear-gradient(90deg, var(--sap-blue), var(--neon-cyan));
      border-radius:2px;
      transition:width 0.4s ease;
      box-shadow:0 0 10px rgba(0,245,255,0.5);
    }
    .progress-label {
      font-size:11px;
      color:var(--text-dim);
      letter-spacing:2px;
      min-height:18px;
    }

    /* LOG TERMINAL */
    .terminal {
      width:420px;
      max-width:90vw;
      background:rgba(0,0,0,0.5);
      border:1px solid rgba(0,245,255,0.15);
      border-radius:10px;
      padding:16px 20px;
      text-align:left;
      font-size:11px;
      color:var(--text-dim);
      line-height:1.8;
      max-height:140px;
      overflow:hidden;
      opacity:0;
      animation: fadeIn 0.6s ease 1.1s forwards;
    }
    .log-line { opacity:0; animation:fadeIn 0.3s ease forwards; }
    .log-line.ok  { color:var(--neon-green); }
    .log-line.info{ color:var(--neon-cyan); }
    .log-line.warn{ color:#F0AB00; }

    /* WELCOME MESSAGE */
    .welcome-msg {
      display:none;
      margin-top:28px;
      font-family:'Orbitron',monospace;
      font-size:14px;
      color:var(--neon-green);
      letter-spacing:3px;
      text-shadow:0 0 20px var(--neon-green);
      animation:pulse 1.5s ease infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

    /* NAV BUTTONS */
    .nav-buttons {
      display:none;
      gap:16px;
      margin-top:28px;
      flex-wrap:wrap;
      justify-content:center;
    }
    .nav-btn {
      padding:14px 32px;
      border:none;
      border-radius:12px;
      font-family:'Orbitron',monospace;
      font-size:12px;
      font-weight:700;
      letter-spacing:2px;
      cursor:pointer;
      transition:all 0.25s;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      gap:8px;
    }
    .nav-btn.primary {
      background:linear-gradient(135deg,#0057A8,#0096FF);
      color:#fff;
      box-shadow:0 4px 20px rgba(0,87,168,0.5);
    }
    .nav-btn.primary:hover { transform:translateY(-3px); box-shadow:0 8px 28px rgba(0,87,168,0.6); }
    .nav-btn.secondary {
      background:rgba(0,245,255,0.08);
      border:1px solid rgba(0,245,255,0.35);
      color:var(--neon-cyan);
    }
    .nav-btn.secondary:hover { background:rgba(0,245,255,0.15); transform:translateY(-3px); }

    @keyframes fadeIn { to { opacity:1; } }
  </style>
</head>
<body>
<canvas id="particle"></canvas>

<div class="load-wrap">
  <div class="logo">SAPZ<span>CODES</span></div>
  <div class="logo-tagline">ABAP LEARNING PLATFORM — INITIALIZING</div>

  <div class="hex-loader">
    <svg viewBox="0 0 100 115" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Outer hex -->
      <polygon points="50,5 95,28 95,87 50,110 5,87 5,28"
        stroke="rgba(0,87,168,0.4)" stroke-width="1" fill="none"/>
      <!-- Mid hex (rotating via CSS) -->
      <polygon points="50,14 86,34 86,81 50,101 14,81 14,34"
        stroke="rgba(0,245,255,0.5)" stroke-width="1.5" fill="none"
        stroke-dasharray="60 200" stroke-dashoffset="0">
        <animateTransform attributeName="transform" type="rotate"
          from="0 50 57" to="360 50 57" dur="3s" repeatCount="indefinite"/>
      </polygon>
      <!-- Inner hex -->
      <polygon points="50,26 75,41 75,72 50,87 25,72 25,41"
        stroke="rgba(0,245,255,0.3)" stroke-width="1" fill="rgba(0,20,50,0.8)"/>
      <!-- Glow dot -->
      <circle cx="50" cy="5" r="3" fill="#00F5FF">
        <animateTransform attributeName="transform" type="rotate"
          from="0 50 57" to="360 50 57" dur="3s" repeatCount="indefinite"/>
      </circle>
    </svg>
    <div class="hex-inner">
      <div class="hex-pct" id="pct">0%</div>
      <div>LOAD</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="pbar"></div></div>
    <div class="progress-label" id="plabel">Authenticating session...</div>
  </div>

  <div class="terminal" id="terminal"></div>

  <div class="welcome-msg" id="welcome">✅ ACCESS GRANTED — WELCOME BACK!</div>

  <div class="nav-buttons" id="nav-btns">
    <a class="nav-btn primary" href="executor.html">🖥️ ABAP EXECUTOR</a>
    <a class="nav-btn secondary" href="games.html">🎮 LEARNING GAMES</a>
  </div>
</div>

<script>
// ── PARTICLE BG ──
(function(){
  const c=document.getElementById('particle'),ctx=c.getContext('2d');
  c.width=innerWidth; c.height=innerHeight;
  window.addEventListener('resize',()=>{c.width=innerWidth;c.height=innerHeight;});
  const pts=Array.from({length:60},()=>({
    x:Math.random()*c.width,y:Math.random()*c.height,
    vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,
    r:Math.random()*1.5+0.3
  }));
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    pts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0)p.x=c.width; if(p.x>c.width)p.x=0;
      if(p.y<0)p.y=c.height; if(p.y>c.height)p.y=0;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba(0,150,255,0.4)'; ctx.fill();
    });
    // connections
    pts.forEach((a,i)=>pts.slice(i+1).forEach(b=>{
      const d=Math.hypot(a.x-b.x,a.y-b.y);
      if(d<120){ ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
        ctx.strokeStyle=`rgba(0,150,255,${0.15*(1-d/120)})`; ctx.lineWidth=0.5; ctx.stroke(); }
    }));
    requestAnimationFrame(draw);
  }
  draw();
})();

// ── AUTH CHECK ──
const email = sessionStorage.getItem('szc_email');
const token = sessionStorage.getItem('szc_token');
const name  = sessionStorage.getItem('szc_name') || 'Student';

if(!email || !token){
  // Not logged in — redirect to main
  window.location.href='index.html';
}

// ── BOOT SEQUENCE ──
const steps = [
  { pct:8,  label:'Authenticating session...', log:'[SYS] Session token validated', cls:'ok' },
  { pct:20, label:'Loading SAP system catalog...', log:'[SYS] Connected to mock ABAP runtime v7.57', cls:'info' },
  { pct:35, label:'Initializing ABAP executor engine...', log:'[EXEC] Executor sandbox initialized', cls:'ok' },
  { pct:48, label:'Loading standard CDS views...', log:'[CDS] I_Material, I_BusinessPartner, I_SalesOrder loaded', cls:'ok' },
  { pct:62, label:'Mounting game modules...', log:'[GAME] 6 learning modules detected', cls:'ok' },
  { pct:74, label:'Fetching student profile...', log:'[PROF] Welcome back, '+name+'!', cls:'info' },
  { pct:85, label:'Applying personalization...', log:'[UI] Interface configured for '+name, cls:'ok' },
  { pct:95, label:'Finalizing environment...', log:'[SYS] All systems nominal', cls:'ok' },
  { pct:100,label:'Ready!', log:'[SYS] ✅ Platform fully loaded. Have fun!', cls:'info' },
];

const pbar    = document.getElementById('pbar');
const plabel  = document.getElementById('plabel');
const pct     = document.getElementById('pct');
const terminal= document.getElementById('terminal');

let idx=0;
function nextStep(){
  if(idx>=steps.length){
    document.getElementById('welcome').style.display='block';
    document.getElementById('nav-btns').style.display='flex';
    return;
  }
  const s=steps[idx++];
  pbar.style.width=s.pct+'%';
  pct.textContent=s.pct+'%';
  plabel.textContent=s.label;
  const line=document.createElement('div');
  line.className='log-line '+s.cls;
  line.textContent=s.log;
  terminal.appendChild(line);
  terminal.scrollTop=terminal.scrollHeight;
  setTimeout(nextStep, idx===steps.length ? 500 : Math.random()*500+350);
}

setTimeout(nextStep, 1200);
</script>
</body>
</html>
