<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SAPZCodes 3D Endless Runner</title>
  <style>
    body { margin: 0; overflow: hidden; background: #0d1117; color: white; font-family: 'JetBrains Mono', monospace; }
    
    /* UI Overlays */
    #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    #score-board { position: absolute; top: 20px; right: 30px; font-size: 1.5rem; font-weight: bold; color: #22a032; text-shadow: 1px 1px 4px #000; }
    #current-question { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); text-align: center; background: rgba(13, 17, 23, 0.85); padding: 15px 30px; border: 1px solid #22a032; border-radius: 8px; font-size: 1.2rem; max-width: 60%; display: none; }
    
    /* 3D Track Overlay Text */
    .obstacle-text { position: absolute; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.7); padding: 8px 15px; border-radius: 6px; font-weight: bold; text-align: center; border: 1px solid #555; transition: top 0.1s linear, left 0.1s linear; display: none; }
    .lane-0 { border-color: #2563eb; }
    .lane-1 { border-color: #d97706; }
    .lane-2 { border-color: #c0392b; }

    /* Game Over Screen */
    #game-over-screen { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; display: none; }
    #game-over-screen h1 { color: #c0392b; font-size: 4rem; margin-bottom: 10px; }
    #final-score { font-size: 2rem; color: #22a032; margin-bottom: 30px; }
    .btn { padding: 12px 30px; background: #22a032; border: none; border-radius: 8px; color: white; font-size: 1.2rem; cursor: pointer; font-weight: bold; }
    .btn:hover { background: #1a8028; }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>

  <div id="ui-layer">
    <div id="score-board">Score: <span id="score">0</span></div>
    <div id="current-question">Loading questions...</div>
    
    <div id="obs-0" class="obstacle-text lane-0">Option A</div>
    <div id="obs-1" class="obstacle-text lane-1">Option B</div>
    <div id="obs-2" class="obstacle-text lane-2">Option C</div>
  </div>

  <div id="game-over-screen">
    <h1>GAME OVER</h1>
    <div id="final-score">Score: 0</div>
    <button class="btn" onclick="location.reload()">Restart Run</button>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

    // ─────────────────────────────────────────────────────────────────
    // 1. SCENE SETUP
    // ─────────────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x0d1117, 0.03);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, -10); 
    camera.lookAt(0, 2, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x0d1117);
    document.body.appendChild(renderer.domElement);

    // Lighting
    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
    hemiLight.position.set(0, 20, 0);
    scene.add(hemiLight);
    
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(-3, 10, -10);
    scene.add(dirLight);

    // Floor / Track
    const gridHelper = new THREE.GridHelper(100, 50, 0x22a032, 0x22a032);
    gridHelper.position.y = 0;
    scene.add(gridHelper);

    // ─────────────────────────────────────────────────────────────────
    // 2. CHARACTER MODEL & ANIMATION
    // ─────────────────────────────────────────────────────────────────
    let mixer, character;
    let clock = new THREE.Clock();
    
    const loader = new FBXLoader();
    // Start by loading the running animation model directly
    loader.load('models/running.fbx', (fbx) => {
      character = fbx;
      character.scale.set(0.02, 0.02, 0.02); // Adjust scale based on your FBX
      character.position.set(0, 0, 0);
      character.rotation.y = Math.PI; // Face forward along positive Z
      scene.add(character);

      mixer = new THREE.AnimationMixer(character);
      const action = mixer.clipAction(fbx.animations[0]);
      action.play();
    });

    // ─────────────────────────────────────────────────────────────────
    // 3. CONTROLLER (Keyboard & Touch)
    // ─────────────────────────────────────────────────────────────────
    const lanes = [-2.5, 0, 2.5]; // Left, Center, Right x-coordinates
    let currentLane = 1; // Start in center
    let targetX = lanes[currentLane];

    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft' && currentLane > 0) currentLane--;
      if (e.key === 'ArrowRight' && currentLane < 2) currentLane++;
      targetX = lanes[currentLane];
    });

    let touchStartX = 0;
    window.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; });
    window.addEventListener('touchend', e => {
      let touchEndX = e.changedTouches[0].screenX;
      if (touchEndX < touchStartX - 30 && currentLane > 0) currentLane--; // Swipe Left
      if (touchEndX > touchStartX + 30 && currentLane < 2) currentLane++; // Swipe Right
      targetX = lanes[currentLane];
    });

    // ─────────────────────────────────────────────────────────────────
    // 4. QUIZ LOGIC & FETCH
    // ─────────────────────────────────────────────────────────────────
    const GAS_URL = 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL';
    let quizData = [];
    let activeQuestion = null;
    let score = 0;
    let isGameOver = false;

    // Obstacle physical blocks in the scene
    let obstacleMeshes = [];
    let obstacleData = []; 
    const gameSpeed = 15; // Z-axis units per second

    async function fetchQuestions() {
      try {
        const res = await fetch(GAS_URL);
        const json = await res.json();
        if (json.status === 'ok') {
          quizData = json.data;
          spawnNextQuestion();
        }
      } catch (err) {
        console.error("Error fetching data:", err);
        document.getElementById('current-question').innerText = "Failed to load DB";
      }
    }

    function spawnNextQuestion() {
      if (quizData.length === 0) return;
      
      // Pick random question
      const randIdx = Math.floor(Math.random() * quizData.length);
      activeQuestion = quizData[randIdx];
      
      document.getElementById('current-question').innerText = activeQuestion.question;
      document.getElementById('current-question').style.display = 'block';

      // Prepare answers and shuffle lanes
      const answers = [
        { text: activeQuestion.correct, isCorrect: true },
        { text: activeQuestion.wrong1, isCorrect: false },
        { text: activeQuestion.wrong2, isCorrect: false }
      ];
      answers.sort(() => Math.random() - 0.5); // Shuffle

      // Clear old meshes
      obstacleMeshes.forEach(mesh => scene.remove(mesh));
      obstacleMeshes = [];
      obstacleData = [];

      // Spawn new obstacles at Z = 40 (far ahead)
      for (let i = 0; i < 3; i++) {
        // Physical box representation
        const geometry = new THREE.BoxGeometry(2, 2, 0.5);
        const material = new THREE.MeshLambertMaterial({ color: 0x333333, transparent: true, opacity: 0.5 });
        const box = new THREE.Mesh(geometry, material);
        box.position.set(lanes[i], 1, 40);
        scene.add(box);
        obstacleMeshes.push(box);

        // Data for HTML mapping
        obstacleData.push({
          mesh: box,
          isCorrect: answers[i].isCorrect,
          uiElement: document.getElementById(`obs-${i}`),
          text: answers[i].text
        });

        const uiElem = document.getElementById(`obs-${i}`);
        uiElem.innerText = answers[i].text;
        uiElem.style.display = 'block';
      }
    }

    // ─────────────────────────────────────────────────────────────────
    // 5. UPDATE LOOP & COLLISIONS
    // ─────────────────────────────────────────────────────────────────
    const vec3 = new THREE.Vector3();

    function updateObstacles(delta) {
      if (!activeQuestion || isGameOver) return;

      for (let i = 0; i < obstacleData.length; i++) {
        const obs = obstacleData[i];
        obs.mesh.position.z -= gameSpeed * delta;

        // Map 3D position to 2D HTML overlay
        vec3.copy(obs.mesh.position);
        vec3.project(camera);
        
        // Convert to screen coordinates
        const x = (vec3.x * .5 + .5) * window.innerWidth;
        const y = (vec3.y * -.5 + .5) * window.innerHeight;
        
        obs.uiElement.style.left = `${x}px`;
        obs.uiElement.style.top = `${y - 40}px`; // slightly above the box

        // Collision Check (Character is at Z = 0)
        if (obs.mesh.position.z < 0.5 && obs.mesh.position.z > -0.5) {
          // If character is in the same lane
          if (lanes[currentLane] === obs.mesh.position.x) {
            handleCollision(obs.isCorrect);
            // Hide everything for next spawn
            obstacleData.forEach(o => o.uiElement.style.display = 'none');
            obstacleData = []; 
            break;
          }
        }
      }
    }

    function handleCollision(isCorrect) {
      if (isCorrect) {
        score += 100;
        document.getElementById('score').innerText = score;
        spawnNextQuestion(); // Success, queue the next one
      } else {
        triggerGameOver();
      }
    }

    function triggerGameOver() {
      isGameOver = true;
      document.getElementById('current-question').style.display = 'none';
      obstacleData.forEach(o => o.uiElement.style.display = 'none');
      document.getElementById('game-over-screen').style.display = 'flex';
      document.getElementById('final-score').innerText = `Final Score: ${score}`;
    }

    function animate() {
      requestAnimationFrame(animate);
      
      const delta = clock.getDelta();

      // Smooth Character Lane Switching
      if (character && !isGameOver) {
        mixer.update(delta);
        character.position.x = THREE.MathUtils.lerp(character.position.x, targetX, 10 * delta);
      }

      // Scroll floor texture to simulate movement
      if (!isGameOver) {
        gridHelper.position.z -= gameSpeed * delta;
        if (gridHelper.position.z < -10) gridHelper.position.z = 0;
      }

      updateObstacles(delta);

      renderer.render(scene, camera);
    }

    // Handle Window Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Start Game
    fetchQuestions();
    animate();

  </script>
</body>
</html>
